    Loading Assets...
</div>

<script>

const BASE_PATH = "https://rawcdn.githack.com/harshulsilverspoon/FNAE-HTML5-1.2.3/main/";

    "menubackground.png": "https://i.ibb.co/sp4rkjRw/menubackground.png",
    "jump.png": "https://i.ibb.co/J4yccRz/jump.png",
    "goldenstephen.png": "https://i.ibb.co/tfLGbp7/goldenstephen.png",
    "front.png": "https://i.ibb.co/5hrmY1Xy/front.png",
    "FNAE-Map-layout.png": "https://i.ibb.co/6Jg0Hb8R/FNAE-Map-layout.png",

    "Cam5.png": "https://i.ibb.co/p6cs1rfR/Cam5.png",
    "Cam4.png": "https://i.ibb.co/c9D5LVQ/Cam4.png",
    "Cam3.png": "https://i.ibb.co/PvTk604R/Cam3.png",
    "Cam2.png": "https://i.ibb.co/KxxYgx4Y/Cam2.png",
    "Cam1.png": "https://i.ibb.co/JjDzKbp2/Cam1.png"
};

async function loadGame() {
    const container = document.getElementById("gameLoader");

    try {
        // Intercept all image requests and redirect them to ImgBB
        const originalFetch = window.fetch;
        window.fetch = function(resource, init) {
            if (typeof resource === 'string') {
                const fileName = resource.split('/').pop().split('?')[0];
                if (assetMap[fileName]) {
                    return originalFetch(assetMap[fileName], init);
                }
                // Otherwise, point to GitHub
                if (!resource.startsWith('http')) {
                    resource = BASE_PATH + resource;
                }
            }
            return originalFetch(resource, init);
        };

        // Fetch the game HTML
        let response = await fetch(GAME_INDEX);
        let html = await response.text();

        // Inject a BASE tag so the game knows where to find everything else (scripts, etc)
        html = `<base href="${BASE_PATH}">` + html;

        // Clean up the HTML so it fits in the div
        html = html.replace(/<html[\s\S]*?>/i, "").replace(/<\/html>/i, "");
        html = html.replace(/<body[\s\S]*?>/i, "").replace(/<\/body>/i, "");

        container.innerHTML = html;

        // Manually trigger the scripts to start the game
        const scripts = container.querySelectorAll("script");
        scripts.forEach(oldScript => {
            const newScript = document.createElement("script");
            if (oldScript.src) {
                newScript.src = oldScript.src;
            } else {
                newScript.textContent = oldScript.textContent;
            }
            document.head.appendChild(newScript);
        });

        container.style.background = "transparent";

    } catch (e) {
        container.innerHTML = "Game failed to load assets.";
        console.error(e);
    }
}

loadGame();
</script>
